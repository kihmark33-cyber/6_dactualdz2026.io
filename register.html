<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Реєстрація</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .register-box {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }
    .register-box h2 {
      margin-bottom: 20px;
      color: #333;
    }
    .register-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: border-color 0.3s;
    }
    .register-box input:focus {
      border-color: #2575fc;
      outline: none;
    }
    .register-box button {
      width: 100%;
      padding: 12px;
      background: #2575fc;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .register-box button:hover {
      background: #6a11cb;
    }
    .register-box p {
      margin-top: 15px;
      font-size: 14px;
    }
    .register-box a {
      color: #2575fc;
      text-decoration: none;
    }
    .register-box a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="register-box">
    <h2>Створіть акаунт</h2>
    <form method="POST" action="/register">
      <input type="text" name="username" placeholder="Ім’я користувача" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Пароль" required>
      <button type="submit">Зареєструватися</button>
    </form>

    <p>Вже маєте акаунт? <a href="/login">Увійти</a></p>
  </div>
</body>
</html>
